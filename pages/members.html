<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Meet the members of Unscripted, the public speaking club of NIT Trichy." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../icons/favicon.png" type="image/png" />
</head>
<body>

<nav class="navbar" id="navbar">
  <a class="nav-logo" href="../index.html"><img src="../icons/logo.png" alt="Unscripted NITT" /></a>
  <div class="nav-links" id="navLinks">
    <a href="../index.html#about">About</a>
    <a href="../index.html#events">Events</a>
    <a href="../index.html#gallery">Gallery</a>
    <a href="../index.html#contact">Contact</a>
    <a href="members.html" style="color:var(--orange);">Members</a>
    <a href="videos.html">Speeches</a>
  </div>
  <div class="nav-actions">
    <button class="btn-login" onclick="window.location.href='login.html'">Member Login</button>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <span class="section-tag" style="position:relative;z-index:1;">The Club</span>
  <h1>Meet the Team</h1>
  <p>The speakers, leaders, and mentors who make Unscripted what it is</p>
</div>

<div class="page-content">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="filterMembers('all', this)">All Members</button>
    <button class="filter-btn" onclick="filterMembers('core', this)">Core Team</button>
    <button class="filter-btn" onclick="filterMembers('mentor', this)">Mentors</button>
    <button class="filter-btn" onclick="filterMembers('member', this)">Members</button>
  </div>
  <div class="members-grid" id="membersGrid">
    <!-- Loading skeletons -->
    <div class="event-skeleton" style="height:200px;"></div>
    <div class="event-skeleton" style="height:200px;"></div>
    <div class="event-skeleton" style="height:200px;"></div>
    <div class="event-skeleton" style="height:200px;"></div>
    <div class="event-skeleton" style="height:200px;"></div>
    <div class="event-skeleton" style="height:200px;"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-brand">
        <div class="footer-logo"><img src="../icons/logo.png" alt="Unscripted" style="height:120px; width:auto;" /></div>
        <p class="footer-tagline">Unscripted NITT</p>
      </div>
      <div class="footer-nav"><h4>Pages</h4><ul>
        <li><a href="../index.html#events">Events</a></li>
        <li><a href="../index.html#gallery">Gallery</a></li>
        <li><a href="../index.html#contact">Contact</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="videos.html">Speeches</a></li>
      </ul></div>
    </div>
    <div class="footer-bottom">
      <p class="footer-copy">© 2025 Unscripted, NIT Trichy.</p>
      <p class="footer-love">Made with <span>♥</span> in Trichy</p>
    </div>
  </div>
</footer>

<script type="module">
import { db } from '../js/firebase-config.js';
import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const AVATAR_COLORS = ['#FF5722','#E64A19','#FF7043','#F4511E','#BF360C','#D84315','#FF6D00','#E65100'];
let allMembers = [];

async function loadMembers() {
  try {
    const q = query(collection(db,'members'), orderBy('name'));
    const snap = await getDocs(q);
    snap.forEach(doc => {
      const data = doc.data();
      if (data.isActive !== false) allMembers.push({id:doc.id, ...data});
    });
    if (allMembers.length === 0) {
      document.getElementById('membersGrid').innerHTML = '<p style="color:var(--mid);text-align:center;grid-column:1/-1;padding:3rem;">Member list coming soon!</p>';
      return;
    }
    renderMembers(allMembers);
  } catch(e) {
    document.getElementById('membersGrid').innerHTML = '<p style="color:var(--mid);text-align:center;grid-column:1/-1;padding:3rem;">Could not load members.</p>';
  }
}

function renderMembers(members) {
  const grid = document.getElementById('membersGrid');
  grid.innerHTML = members.map((m, i) => {
    const initials = (m.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const color = m.avatarColor || AVATAR_COLORS[i % AVATAR_COLORS.length];
    const roleLabel = m.role === 'core' ? 'Core Team' : m.role === 'mentor' ? 'Mentor' : 'Member';
    return `<div class="member-card fade-up visible">
      <div class="avatar" style="background:${color}">${initials}</div>
      <h3>${m.name||'Member'}</h3>
        <div class="dept">${m.dept||''} ${m.year?`: ${m.year}`:''}</div>
        <div class="video-meta">${roleLabel}</div>
    </div>`;
  }).join('');
}

window.filterMembers = function(role, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (role === 'all') renderMembers(allMembers);
  else renderMembers(allMembers.filter(m=>m.role===role));
};

loadMembers();
</script>
<script src="../js/nav.js" type="module"></script>
</body>
</html>
